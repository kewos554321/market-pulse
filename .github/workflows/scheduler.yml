name: Market Pulse Scheduler

on:
  schedule:
    - cron: '35 6 * * 1-5'  # 14:35 Taiwan time (UTC+8), weekdays only
  workflow_dispatch:          # Manual trigger for testing

jobs:
  run-scheduler:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        continue-on-error: true
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Run scheduler
        env:
          WORKERS_API_URL: ${{ secrets.WORKERS_API_URL }}
          WORKERS_API_KEY: ${{ secrets.WORKERS_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FINMIND_TOKEN: ${{ secrets.FINMIND_TOKEN }}
        run: |
          cd scheduler
          printf "WORKERS_API_URL=%s\nWORKERS_API_KEY=%s\nRESEND_API_KEY=%s\nFINMIND_TOKEN=%s\n" \
            "$WORKERS_API_URL" "$WORKERS_API_KEY" "$RESEND_API_KEY" "$FINMIND_TOKEN" > .env
          npm start
